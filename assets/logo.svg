<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" />
  <circle cx="100" cy="100" r="96" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.4"/>

  <!-- Person silhouette — head -->
  <circle cx="88" cy="66" r="23" fill="white" opacity="0.95"/>

  <!-- Person silhouette — body/shoulders -->
  <path d="M42 148 Q42 98 88 98 Q134 98 134 148 Z" fill="white" opacity="0.95"/>

  <!-- Warning badge (bottom-right) -->
  <circle cx="141" cy="139" r="30" fill="url(#badge)"/>
  <circle cx="141" cy="139" r="30" fill="none" stroke="white" stroke-width="3" opacity="0.6"/>

  <!-- Warning triangle outline inside badge -->
  <polygon points="141,116 160,150 122,150"
           fill="none" stroke="white" stroke-width="2.5"
           stroke-linejoin="round" opacity="0.35"/>

  <!-- Exclamation mark -->
  <rect x="138.5" y="123" width="5" height="14" rx="2.5" fill="white"/>
  <circle cx="141" cy="145" r="3" fill="white"/>
</svg>
