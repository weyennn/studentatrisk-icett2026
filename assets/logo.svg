<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" />
  <circle cx="100" cy="100" r="96" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Shield shape -->
  <path d="M100 28 L148 50 L148 104 Q148 148 100 170 Q52 148 52 104 L52 50 Z"
        fill="url(#shield_grad)" stroke="white" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>

  <!-- Checkmark / pulse icon inside shield -->
  <polyline points="74,100 90,116 128,82"
            fill="none" stroke="white" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small dot accent -->
  <circle cx="100" cy="155" r="4" fill="white" opacity="0.6"/>
</svg>
